<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Built-In-Functions</title>
</head>
<body>
    <script>
        alert("Welcome to JS")
        let confirmation=confirm("Are you Sure?")
        console.log(confirmation)
        var myname=prompt("Enter your name")
        console.log(myname)

        let agestr="50";
        let age=parseInt(agestr)
        console.log(++age)

        let priceStr="965.16";
        let price=parseFloat(priceStr)
        console.log(price)

        let mystr="abcd";
        let result=parseInt(mystr)
        console.log(result)

        alert(isNaN(result))
    </script>

</body>
</html>
